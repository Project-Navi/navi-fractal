name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 6 * * 1"  # Monday 06:15 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  scorecard:
    uses: Project-Navi/.github/.github/workflows/scorecard.yml@6c4c2d8f200b1b9c3bd651ebc297425e45d5934e
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    secrets: inherit
