[project]
name = "navi-fractal"
site_name = "navi-fractal"
description = "Audit-grade fractal dimension estimation for graphs"
site_url = "https://project-navi.github.io/navi-fractal"
repo_url = "https://github.com/Project-Navi/navi-fractal"
repo_name = "Project-Navi/navi-fractal"
copyright = "Copyright 2024-2026 Nelson Spence"
extra_css = ["stylesheets/navi.css"]

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Installation" = "getting-started/installation.md"},
    {"Quickstart" = "getting-started/quickstart.md"},
    {"Interpreting Results" = "getting-started/interpreting-results.md"},
  ]},
  {"How-To Guides" = [
    {"Bring Your Own Graph" = "how-to/bring-your-own-graph.md"},
    {"Tune Quality Gates" = "how-to/tune-quality-gates.md"},
    {"Run Calibration" = "how-to/run-calibration.md"},
  ]},
  {"Explanation" = [
    {"How It Works" = "explanation/how-it-works.md"},
    {"Quality Gates" = "explanation/quality-gates.md"},
    {"Theory Bridge" = "explanation/theory-bridge.md"},
    {"Calibration Regime" = "explanation/calibration-regime.md"},
  ]},
  {"Reference" = [
    {"API" = "reference/api.md"},
    {"Reason Codes" = "reference/reason-codes.md"},
    {"Changelog" = "reference/changelog.md"},
  ]},
]

[project.theme]
logo = "assets/logo.png"
favicon = "assets/favicon.png"

[project.theme.palette]
scheme = "slate"

[project.theme.features]
navigation_sections = true
navigation_expand = true
navigation_top = true
content_code_copy = true
toc_integrate = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.plugins.search]
